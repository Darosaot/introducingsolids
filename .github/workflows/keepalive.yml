name: Supabase keep-alive

# Evita que el proyecto de Supabase (plan free) se pause por inactividad:
# hace un ping ligero a la API REST cada día. La consulta se ejecuta con la
# clave pública (anon/publishable), protegida por RLS: no expone datos, solo
# mantiene la base de datos "activa".
#
# Requisito: definir en el repo el secret `SUPABASE_ANON_KEY`
#   (Settings → Secrets and variables → Actions → New repository secret).
#
# Nota: los workflows programados solo se ejecutan desde la rama por defecto
# (main), así que esto se activa al mergear.

on:
  schedule:
    - cron: '17 6 * * *' # cada día a las 06:17 UTC (margen de sobra ante la pausa de 7 días)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: https://scmwaisbvonczucbbwrx.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Falta el secret SUPABASE_ANON_KEY"; exit 1
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "$SUPABASE_URL/rest/v1/rpc/ping" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Respuesta HTTP: $code"
          # 200 = la función ping() respondió y la BD sigue activa
          test "$code" -ge 200 -a "$code" -lt 400
